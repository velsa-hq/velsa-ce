# Lookup map for `:::video <slug>` handbook embeds.
#
# Each slug maps to a YouTube video that gets rendered as a thumbnail
# (via i.ytimg.com) with a play overlay in the handbook prose; clicking
# the thumbnail opens a lightbox dialog with an embedded YouTube player.
#
# Why a lookup file (vs. raw iframes in markdown):
#  - Re-recording a video means swapping one ID here, not chasing
#    iframe markup across every page that references it.
#  - Multiple pages can reference the same video by the same stable
#    slug (e.g. drafting-and-sending + bookings overview both
#    embedding the contract video).
#  - Videos with `youtube_id: null` render as a "Coming soon" tile,
#    so handbook pages can reference a video before it's uploaded.
#
# The slug used here is conventionally the training/scripts/<slug>.yml
# basename, so the markdown block + script + screencast all share one
# name.

